<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fundamental of DevOps – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg">
    <div class="login-card" id="loginCard">
      <!-- Institution Icon -->
      <div class="icon-wrap">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="bank-icon">
          <rect x="8" y="28" width="48" height="28" rx="2" fill="#8B2FC9"/>
          <rect x="4" y="52" width="56" height="8" rx="2" fill="#7A27B5"/>
          <rect x="16" y="24" width="4" height="32" fill="#6D1F9E"/>
          <rect x="30" y="24" width="4" height="32" fill="#6D1F9E"/>
          <rect x="44" y="24" width="4" height="32" fill="#6D1F9E"/>
          <polygon points="32,4 4,26 60,26" fill="#9B35D9"/>
        </svg>
      </div>

      <h1 class="card-title">Fundamental of DevOps</h1>
      <p class="card-subtitle">AIML / IT1 / IT2</p>

      <!-- Error message box -->
      <div class="error-msg" id="errorMsg" style="display:none;"></div>

      <!-- Email Field -->
      <div class="input-group">
        <span class="input-icon">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
        </span>
        <input type="email" id="emailInput" placeholder="Email ID" autocomplete="email" />
      </div>

      <!-- Password Field -->
      <div class="input-group">
        <span class="input-icon">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
        </span>
        <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" />
      </div>

      <!-- Login Button -->
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span id="loginBtnText">LOGIN</span>
        <span id="loginSpinner" style="display:none;" class="spinner"></span>
      </button>

      <hr class="divider" />

      <!-- New User Row -->
      <div class="input-group">
        <span class="input-icon key-icon">
          <svg viewBox="0 0 20 20" fill="#8B2FC9"><path fill-rule="evenodd" d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z" clip-rule="evenodd"/></svg>
        </span>
        <input type="text" id="registerCode" placeholder="New User? Enter Code here" />
      </div>

      <button class="btn-register" onclick="handleRegister()">
        You can Register here Now
      </button>
    </div>
  </div>

  <!-- Register Modal -->
  <div class="modal-overlay" id="registerModal" style="display:none;">
    <div class="modal-card">
      <h2>Register</h2>
      <p class="modal-sub">Enter your details to create an account</p>
      <div class="input-group">
        <span class="input-icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg></span>
        <input type="text" id="regName" placeholder="Full Name" />
      </div>
      <div class="input-group">
        <span class="input-icon"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg></span>
        <input type="email" id="regEmail" placeholder="College Email ID" />
      </div>
      <div class="input-group">
        <span class="input-icon"><svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg></span>
        <input type="password" id="regPassword" placeholder="Set Password" />
      </div>
      <div class="input-group">
        <span class="input-icon"><svg viewBox="0 0 20 20" fill="#8B2FC9"><path fill-rule="evenodd" d="M18 8a6 6 0 01-7.743 5.743L10 14l-1 1-1 1H6v2H2v-4l4.257-4.257A6 6 0 1118 8zm-6-4a1 1 0 100 2 2 2 0 012 2 1 1 0 102 0 4 4 0 00-4-4z" clip-rule="evenodd"/></svg></span>
        <input type="text" id="regCode" placeholder="Registration Code" />
      </div>
      <div class="modal-error" id="modalError" style="display:none;"></div>
      <div class="modal-actions">
        <button class="btn-register" onclick="submitRegister()">Register</button>
        <button class="btn-cancel" onclick="closeRegister()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
